<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Regular hex points (same as your center) -->
    <polygon id="hex" points="256 160 339.138 208 339.138 304 256 352 172.862 304 172.862 208"></polygon>

    <!-- Inverse clip: show everything EXCEPT inside the hex -->
    <clipPath id="outsideHex" clipPathUnits="userSpaceOnUse">
      <!-- evenodd path: full canvas minus the hex -->
      <path clip-rule="evenodd" d="M0 0H512V512H0Z
           M256 160 339.138 208 339.138 304 256 352 172.862 304 172.862 208 Z"></path>
    </clipPath>

    <!-- Petal shapes (pointing up). Keep these as simple fills -> outlines -->
    <path id="petalOuter" d="M256 72
         C228 110 212 142 214 182
         C216 226 238 260 256 286
         C274 260 296 226 298 182
         C300 142 284 110 256 72 Z"></path>

    <path id="petalInner" d="M256 108
         C240 130 232 150 233 175
         C234 205 246 230 256 248
         C266 230 278 205 279 175
         C280 150 272 130 256 108 Z"></path>
  </defs>

  <!-- STYLE: force identical stroke behavior everywhere -->
  <g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke">

    <!-- PETALS clipped so they vanish inside the hexagon -->
    <g clip-path="url(#outsideHex)">
      <!-- Outer petal strokes -->
      <g stroke-width="10">
        <use href="#petalOuter"></use>
        <g transform="rotate(45 256 256)"><use href="#petalOuter"></use></g>
        <g transform="rotate(90 256 256)"><use href="#petalOuter"></use></g>
        <g transform="rotate(135 256 256)"><use href="#petalOuter"></use></g>
        <g transform="rotate(180 256 256)"><use href="#petalOuter"></use></g>
        <g transform="rotate(225 256 256)"><use href="#petalOuter"></use></g>
        <g transform="rotate(270 256 256)"><use href="#petalOuter"></use></g>
        <g transform="rotate(315 256 256)"><use href="#petalOuter"></use></g>
      </g>

      <!-- Inner petal strokes (slightly thinner like your reference) -->
      <g stroke-width="8">
        <use href="#petalInner"></use>
        <g transform="rotate(45 256 256)"><use href="#petalInner"></use></g>
        <g transform="rotate(90 256 256)"><use href="#petalInner"></use></g>
        <g transform="rotate(135 256 256)"><use href="#petalInner"></use></g>
        <g transform="rotate(180 256 256)"><use href="#petalInner"></use></g>
        <g transform="rotate(225 256 256)"><use href="#petalInner"></use></g>
        <g transform="rotate(270 256 256)"><use href="#petalInner"></use></g>
        <g transform="rotate(315 256 256)"><use href="#petalInner"></use></g>
      </g>
    </g>

    <!-- Central hexagon -->
    <use href="#hex" stroke-width="14"></use>

    <!-- Starburst / internal geometry -->
    <g stroke-width="8">
      <!-- Rays to vertices -->
      <line x1="256" y1="256" x2="256" y2="160"></line>
      <line x1="256" y1="256" x2="339.138" y2="208"></line>
      <line x1="256" y1="256" x2="339.138" y2="304"></line>
      <line x1="256" y1="256" x2="256" y2="352"></line>
      <line x1="256" y1="256" x2="172.862" y2="304"></line>
      <line x1="256" y1="256" x2="172.862" y2="208"></line>

      <!-- Rays to edge midpoints -->
      <line x1="256" y1="256" x2="297.569" y2="184"></line>
      <line x1="256" y1="256" x2="339.138" y2="256"></line>
      <line x1="256" y1="256" x2="297.569" y2="328"></line>
      <line x1="256" y1="256" x2="214.431" y2="328"></line>
      <line x1="256" y1="256" x2="172.862" y2="256"></line>
      <line x1="256" y1="256" x2="214.431" y2="184"></line>
    </g>
  </g>
</svg>