<svg xmlns="http://www.w3.org/2000/svg" viewBox="128 128 256 256">
  <defs>
    <!-- Base hex -->
    <polygon id="hexBase"
      points="256 160 339.138 208 339.138 304 256 352 172.862 304 172.862 208" />

    <!-- New hex scale: ~0.47 (≈0.67 * 0.7) -->
    <g id="hexScaled" transform="translate(256 256) scale(0.5) translate(-256 -256)">
      <use href="#hexBase"/>
    </g>

    <!-- Inverse clip using the new scaled hex -->
    <clipPath id="outsideHexScaled" clipPathUnits="userSpaceOnUse">
      <path clip-rule="evenodd"
        d="M0 0H512V512H0Z
           M256 160 339.138 208 339.138 304 256 352 172.862 304 172.862 208 Z"
        transform="translate(256 256) scale(0.47) translate(-256 -256)" />
    </clipPath>

    <!-- Petal geometry (pointing up) -->
    <path id="petalOuter"
      d="M256 72
         C228 110 212 142 214 182
         C216 226 238 260 256 286
         C274 260 296 226 298 182
         C300 142 284 110 256 72 Z" />
    <path id="petalInner"
      d="M256 108
         C240 130 232 150 233 175
         C234 205 246 230 256 248
         C266 230 278 205 279 175
         C280 150 272 130 256 108 Z" />

    <!-- Petal group (unchanged size) but shifted inward toward center -->
    <!-- PETAL_SCALE = 0.70, PETAL_SX = 0.82, PETAL_TRANSLATE_Y = 22 (pixels inward) -->
    <g id="petalGroup"
       transform="translate(256 256) scale(0.65) translate(0 22) scale(0.70 1) translate(-256 -256)">
      <use href="#petalOuter"/>
      <use href="#petalInner"/>
    </g>

    <!-- Inner lines (base coords) -->
    <g id="innerLines">
      <line x1="256" y1="256" x2="256" y2="160"/>
      <line x1="256" y1="256" x2="339.138" y2="208"/>
      <line x1="256" y1="256" x2="339.138" y2="304"/>
      <line x1="256" y1="256" x2="256" y2="352"/>
      <line x1="256" y1="256" x2="172.862" y2="304"/>
      <line x1="256" y1="256" x2="172.862" y2="208"/>

      <line x1="256" y1="256" x2="297.569" y2="184"/>
      <line x1="256" y1="256" x2="339.138" y2="256"/>
      <line x1="256" y1="256" x2="297.569" y2="328"/>
      <line x1="256" y1="256" x2="214.431" y2="328"/>
      <line x1="256" y1="256" x2="172.862" y2="256"/>
      <line x1="256" y1="256" x2="214.431" y2="184"/>
    </g>
  </defs>

  <!-- Draw with consistent styling -->
  <g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin=""
     vector-effect="non-scaling-stroke">
    <!-- Petals clipped to the (new-smaller) hex so they meet it cleanly -->
    <g clip-path="url(#outsideHexScaled)" stroke-width="10">
      <use href="#petalGroup"/>
      <use href="#petalGroup" transform="rotate(45 256 256)"/>
      <use href="#petalGroup" transform="rotate(90 256 256)"/>
      <use href="#petalGroup" transform="rotate(135 256 256)"/>
      <use href="#petalGroup" transform="rotate(180 256 256)"/>
      <use href="#petalGroup" transform="rotate(225 256 256)"/>
      <use href="#petalGroup" transform="rotate(270 256 256)"/>
      <use href="#petalGroup" transform="rotate(315 256 256)"/>
    </g>

    <!-- Scaled-down hex -->
    <g stroke-width="14">
      <use href="#hexScaled"/>
    </g>

    <!-- Inner lines: scaled with hex and thin -->
    <g stroke-width="4" transform="translate(256 256) scale(0.50) translate(-256 -256)">
      <use href="#innerLines"/>
    </g>
  </g>
</svg>